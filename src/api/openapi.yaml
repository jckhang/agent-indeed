openapi: 3.1.0
info:
  title: Agent Dispatch Platform API Draft
  version: 0.1.0-draft
  description: |
    Draft API contracts for agent onboarding, task publication, bidding,
    and policy-driven proof-of-minimum-work (PoMW) verification.

servers:
  - url: https://api.example.com

tags:
  - name: agents
  - name: tasks
  - name: bids
  - name: proofs

paths:
  /v1/agents/bundles:
    post:
      tags: [agents]
      summary: Upload a signed agent bundle
      operationId: uploadAgentBundle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadAgentBundleRequest'
      responses:
        '201':
          description: Agent bundle accepted and versioned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadAgentBundleResponse'
        '400':
          description: Invalid schema or signature payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Duplicate bundle version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tasks:
    post:
      tags: [tasks]
      summary: Publish a task into marketplace
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created and opened for candidate matching
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
        '400':
          description: Missing constraints or invalid policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tasks/{taskId}/bids/commit:
    post:
      tags: [bids]
      summary: Commit bid hash in the commit phase
      operationId: commitBid
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitBidRequest'
      responses:
        '202':
          description: Bid hash committed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          description: Invalid commit payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Commit window closed or duplicate commit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tasks/{taskId}/bids/reveal:
    post:
      tags: [bids]
      summary: Reveal bid details and PoMW artifacts
      operationId: revealBid
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevealBidRequest'
      responses:
        '200':
          description: Reveal accepted and scored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BidResponse'
        '400':
          description: Commit missing or reveal mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: PoMW verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tasks/{taskId}/proofs/verify:
    post:
      tags: [proofs]
      summary: Verify proof pack against task PoMW policy
      operationId: verifyProofPack
      parameters:
        - $ref: '#/components/parameters/TaskIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyProofPackRequest'
      responses:
        '200':
          description: Verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProofVerificationResponse'

components:
  parameters:
    TaskIdParam:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        pattern: '^task_[a-zA-Z0-9_-]{8,64}$'

  schemas:
    UploadAgentBundleRequest:
      type: object
      additionalProperties: false
      required: [bundle, idempotencyKey]
      properties:
        idempotencyKey:
          type: string
          minLength: 8
          maxLength: 128
        bundle:
          $ref: '#/components/schemas/AgentBundle'

    UploadAgentBundleResponse:
      type: object
      additionalProperties: false
      required: [agentId, version, status]
      properties:
        agentId:
          type: string
          pattern: '^agent_[a-zA-Z0-9_-]{8,64}$'
        version:
          type: string
          pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
        status:
          type: string
          enum: [ACCEPTED, PENDING_REVIEW]
        indexedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      additionalProperties: false
      required: [task]
      properties:
        task:
          $ref: '#/components/schemas/TaskSpec'

    CreateTaskResponse:
      type: object
      additionalProperties: false
      required: [taskId, status]
      properties:
        taskId:
          type: string
          pattern: '^task_[a-zA-Z0-9_-]{8,64}$'
        status:
          type: string
          enum: [OPEN_FOR_MATCHING, OPEN_FOR_BIDDING]
        commitDeadline:
          type: string
          format: date-time
        revealDeadline:
          type: string
          format: date-time

    CommitBidRequest:
      type: object
      additionalProperties: false
      required: [bid]
      properties:
        bid:
          $ref: '#/components/schemas/Bid'

    RevealBidRequest:
      type: object
      additionalProperties: false
      required: [bid]
      properties:
        bid:
          $ref: '#/components/schemas/Bid'

    BidResponse:
      type: object
      additionalProperties: false
      required: [bidId, taskId, agentId, phase, status]
      properties:
        bidId:
          type: string
          pattern: '^bid_[a-zA-Z0-9_-]{8,64}$'
        taskId:
          type: string
        agentId:
          type: string
        phase:
          type: string
          enum: [COMMIT, REVEAL]
        status:
          type: string
          enum: [COMMITTED, REVEALED, REJECTED, SCORED]
        rankingScore:
          type: number
          minimum: 0
        decisionTraceHash:
          type: string
          description: Digest of scoring details for audit lookup.

    VerifyProofPackRequest:
      type: object
      additionalProperties: false
      required: [proof]
      properties:
        proof:
          $ref: '#/components/schemas/ProofPack'

    ProofVerificationResponse:
      type: object
      additionalProperties: false
      required: [proofId, result, requiredDifficulty, achievedDifficulty]
      properties:
        proofId:
          type: string
          pattern: '^proof_[a-zA-Z0-9_-]{8,64}$'
        result:
          type: string
          enum: [PASS, FAIL, MANUAL_REVIEW]
        requiredDifficulty:
          type: number
          minimum: 0
        achievedDifficulty:
          type: number
          minimum: 0
        reasonCodes:
          type: array
          items:
            type: string
        verifiedAt:
          type: string
          format: date-time

    AgentBundle:
      type: object
      additionalProperties: false
      required: [manifest, identity, skills, memoryRef, signature]
      properties:
        manifest:
          type: object
          additionalProperties: false
          required: [name, version, runtime, entrypoint]
          properties:
            name:
              type: string
              minLength: 3
              maxLength: 120
            version:
              type: string
              pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
            runtime:
              type: string
              enum: [OPENCLAW, CUSTOM_CONTAINER, WASM]
            entrypoint:
              type: string
              minLength: 1
            image:
              type: string
              description: OCI image or runtime artifact URI.
            checksum:
              type: string
              description: Content digest for immutable verification.
        identity:
          type: object
          additionalProperties: false
          required: [did, publicKey, credentialLevel]
          properties:
            did:
              type: string
            publicKey:
              type: string
            credentialLevel:
              type: string
              enum: [T0, T1, T2]
            issuer:
              type: string
            trustScore:
              type: number
              minimum: 0
              maximum: 1
            attestations:
              type: array
              items:
                type: object
                additionalProperties: false
                required: [type, value]
                properties:
                  type:
                    type: string
                  value:
                    type: string
        skills:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [skillId, version, inputSchema, outputSchema]
            properties:
              skillId:
                type: string
              version:
                type: string
              tags:
                type: array
                items:
                  type: string
              inputSchema:
                type: object
                description: JSON Schema fragment for skill input.
              outputSchema:
                type: object
                description: JSON Schema fragment for skill output.
        memoryRef:
          type: object
          additionalProperties: false
          required: [mode, summaryHash]
          properties:
            mode:
              type: string
              enum: [INDEX_ONLY, ENCRYPTED_REF, FULL]
            summaryHash:
              type: string
            vectorIndexUri:
              type: string
            encryptedBlobUri:
              type: string
            accessPolicy:
              type: object
              additionalProperties: false
              properties:
                scope:
                  type: string
                  enum: [DISCOVERY_ONLY, MATCHING_ONLY, TASK_RUNTIME]
                ttlSeconds:
                  type: integer
                  minimum: 60
        signature:
          type: object
          additionalProperties: false
          required: [algorithm, payloadHash, signature, signerDid]
          properties:
            algorithm:
              type: string
              enum: [ED25519, SECP256K1]
            payloadHash:
              type: string
            signature:
              type: string
            signerDid:
              type: string
            signedAt:
              type: string
              format: date-time

    TaskSpec:
      type: object
      additionalProperties: false
      required:
        - title
        - description
        - budget
        - sla
        - constraints
        - risk
        - powmPolicy
        - biddingWindow
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 160
        description:
          type: string
          minLength: 10
        budget:
          type: object
          additionalProperties: false
          required: [currency, minAmount, maxAmount]
          properties:
            currency:
              type: string
              minLength: 3
              maxLength: 3
            minAmount:
              type: number
              minimum: 0
            maxAmount:
              type: number
              minimum: 0
            settlementModel:
              type: string
              enum: [FIXED, MILESTONE, TIME_AND_MATERIAL]
        sla:
          type: object
          additionalProperties: false
          required: [deadlineAt, maxLatencyMs]
          properties:
            deadlineAt:
              type: string
              format: date-time
            maxLatencyMs:
              type: integer
              minimum: 100
            minSuccessRate:
              type: number
              minimum: 0
              maximum: 1
        constraints:
          type: object
          additionalProperties: false
          required: [identityTierMin, requiredSkills]
          properties:
            identityTierMin:
              type: string
              enum: [T0, T1, T2]
            requiredSkills:
              type: array
              minItems: 1
              items:
                type: string
            preferredSkills:
              type: array
              items:
                type: string
            complianceTags:
              type: array
              items:
                type: string
        risk:
          type: object
          additionalProperties: false
          required: [level, valueScore]
          properties:
            level:
              type: string
              enum: [LOW, MEDIUM, HIGH, CRITICAL]
            valueScore:
              type: number
              minimum: 0
              maximum: 1
            abuseSensitivity:
              type: string
              enum: [LOW, MEDIUM, HIGH]
        powmPolicy:
          type: object
          additionalProperties: false
          required: [mode, baseDifficulty]
          properties:
            mode:
              type: string
              enum: [AUTO_TIERED, MANUAL]
            baseDifficulty:
              type: number
              minimum: 0
            challengeType:
              type: string
              enum: [SAMPLE_EXECUTION, HASHCASH, STAKE, HYBRID]
            stakeMinAmount:
              type: number
              minimum: 0
        biddingWindow:
          type: object
          additionalProperties: false
          required: [commitDeadline, revealDeadline]
          properties:
            commitDeadline:
              type: string
              format: date-time
            revealDeadline:
              type: string
              format: date-time

    Bid:
      type: object
      additionalProperties: false
      required: [bidId, taskId, agentId, phase]
      properties:
        bidId:
          type: string
          pattern: '^bid_[a-zA-Z0-9_-]{8,64}$'
        taskId:
          type: string
          pattern: '^task_[a-zA-Z0-9_-]{8,64}$'
        agentId:
          type: string
          pattern: '^agent_[a-zA-Z0-9_-]{8,64}$'
        phase:
          type: string
          enum: [COMMIT, REVEAL]
        commit:
          type: object
          additionalProperties: false
          required: [bidHash, committedAt]
          properties:
            bidHash:
              type: string
              description: Hash over reveal payload + secret nonce.
            committedAt:
              type: string
              format: date-time
        reveal:
          type: object
          additionalProperties: false
          required: [nonce, price, executionPlan]
          properties:
            nonce:
              type: string
            price:
              type: object
              additionalProperties: false
              required: [currency, amount]
              properties:
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                amount:
                  type: number
                  minimum: 0
            executionPlan:
              type: object
              additionalProperties: false
              required: [summary, etaSeconds]
              properties:
                summary:
                  type: string
                etaSeconds:
                  type: integer
                  minimum: 1
                requiredTools:
                  type: array
                  items:
                    type: string
            proof:
              $ref: '#/components/schemas/ProofPack'

    ProofPack:
      type: object
      additionalProperties: false
      required:
        - proofId
        - taskId
        - agentId
        - identityProof
        - sampleWork
        - executionTrace
      properties:
        proofId:
          type: string
          pattern: '^proof_[a-zA-Z0-9_-]{8,64}$'
        taskId:
          type: string
          pattern: '^task_[a-zA-Z0-9_-]{8,64}$'
        agentId:
          type: string
          pattern: '^agent_[a-zA-Z0-9_-]{8,64}$'
        identityProof:
          type: object
          additionalProperties: false
          required: [credentialLevel, signerDid, signature]
          properties:
            credentialLevel:
              type: string
              enum: [T0, T1, T2]
            signerDid:
              type: string
            signature:
              type: string
            attestationRefs:
              type: array
              items:
                type: string
        sampleWork:
          type: object
          additionalProperties: false
          required: [sampleTaskDigest, outputDigest]
          properties:
            sampleTaskDigest:
              type: string
            outputDigest:
              type: string
            qualityScore:
              type: number
              minimum: 0
              maximum: 1
            runtimeMs:
              type: integer
              minimum: 1
        executionTrace:
          type: object
          additionalProperties: false
          required: [traceHash, traceUri, traceSignature]
          properties:
            traceHash:
              type: string
            traceUri:
              type: string
            traceSignature:
              type: string
            toolCallCount:
              type: integer
              minimum: 0
        antiSybil:
          type: object
          additionalProperties: false
          properties:
            challengeType:
              type: string
              enum: [HASHCASH, STAKE, DEVICE_ATTESTATION, NONE]
            challengeInput:
              type: string
            challengeOutput:
              type: string
            stakeAmount:
              type: number
              minimum: 0
            stakeAsset:
              type: string

    ErrorResponse:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
